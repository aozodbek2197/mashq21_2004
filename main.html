<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <style>
        .board {display:flex; gap:20px; padding:20px;}
        .column {width:300px; background:#f0f0f0; padding:15px; border-radius:8px; min-height:500px;}
        .task {background:white; padding:15px; margin:10px 0; border-radius:6px; cursor:move; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
    </style>
</head>
<body>
    <h1>Kanban Board</h1>
    <div class="board">
        <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>To Do</h2>
            <div class="task" draggable="true" ondragstart="drag(event)" id="task1">HTML masalalarni yechish</div>
        </div>
        <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>In Progress</h2>
        </div>
        <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)">
            <h2>Done</h2>
        </div>
    </div>

    <script>
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev) { ev.dataTransfer.setData("text", ev.target.id); }
        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            ev.target.appendChild(document.getElementById(data));
        }
    </script>
</body>
</html>
